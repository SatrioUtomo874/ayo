name: Run Signal Bot

on:
  schedule:
    - cron: '*/5 * * * *'   # setiap 5 menit
  workflow_dispatch:          # bisa juga trigger manual

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests numpy

      - name: Jalankan bot
        run: python bot_github.py

      - name: Commit ban state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ban_state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update ban state"
          git push
